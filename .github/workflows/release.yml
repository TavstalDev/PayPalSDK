# GitHub Actions workflow for building and releasing
name: Build and Release

on:
  push:
    branches:
      - 'stable'

permissions:
  contents: write
  id-token: write

env:
  PROJECT_NAME: PayPalSDK
  SLN_NAME: PayPalSDK.sln
  DLL_NAME: PayPalSDK.dll
  CSPROJ_PATH: ./PayPalSDK/PayPalSDK.csproj

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x

      - name: Restore Dependencies
        run: dotnet restore ${{ env.SLN_NAME }}

      - name: Build Solution
        run: dotnet build ${{ env.SLN_NAME }} --configuration Release --no-restore

      - name: Run Tests
        run: |
          dotnet test ${{ env.SLN_NAME }} \
            --configuration Release \
            --no-build \
            --logger "trx;LogFileName=test-results.trx" \
            --verbosity normal

      - name: Extract Version
        id: extract_version
        run: |
          VERSION=$(grep -oE '<Version>[^<]+' "${{ env.CSPROJ_PATH }}" | head -1 | sed 's/<Version>//')
          if [ -z "$VERSION" ]; then
            VERSION=$(grep -oE '<FileVersion>[^<]+' "${{ env.CSPROJ_PATH }}" | head -1 | sed 's/<FileVersion>//')
          fi
          VERSION=${VERSION:-1.0.0}
          echo "DLL_VERSION=$VERSION" >> $GITHUB_ENV
          echo "NUPKG_PATH=./nupkg/${{ env.PROJECT_NAME }}.$VERSION.nupkg" >> $GITHUB_ENV

      - name: Pack NuGet Package
        run: |
          dotnet pack ${{ env.CSPROJ_PATH }} \
            --configuration Release \
            --no-build \
            --output ./nupkg

      - name: Collect DLLs with framework names
        run: |
          mkdir -p ./artifacts
          for dir in ./PayPalSDK/bin/Release/*/; do
            framework=$(basename "$dir")
            if [ -f "$dir/PayPalSDK.dll" ]; then
              cp "$dir/PayPalSDK.dll" "./artifacts/PayPalSDK-$framework.dll"
            fi
          done

      - name: Get latest tag
        id: get_latest_tag
        run: |
          git fetch --tags || true
          LATEST_TAG=$(git tag -l | sort -V | tail -n 1)
          echo "LATEST_TAG=${LATEST_TAG:-none}" >> $GITHUB_ENV

      - name: Prepare Release Body
        run: |
          git fetch --unshallow || true
          {
            echo "## Changelog"
            echo "Changes pushed to branch \`${{ github.ref_name }}\`"
            echo ""
            echo "<details>"
            echo "<summary>Click to expand commit list</summary>"
            echo ""
            if [ "$LATEST_TAG" = "none" ]; then
              git log HEAD --pretty=format:"- [%h](https://github.com/${{ github.repository }}/commit/%h) - %s"
            else
              git log "$LATEST_TAG..HEAD" --pretty=format:"- [%h](https://github.com/${{ github.repository }}/commit/%h) - %s"
            fi
            echo ""
            echo "</details>"
          } > /tmp/release_body.md

      - name: Create GitHub Release and Upload Assets
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b
        with:
          tag_name: v${{ env.DLL_VERSION }}
          name: Build ${{ env.DLL_VERSION }}
          draft: false
          prerelease: true
          body_path: /tmp/release_body.md
          files: |
            ./artifacts/*
            ${{ env.NUPKG_PATH }}
            ./nupkg/*.snupkg

      - name: NuGet Login (OIDC Authentication)
        uses: NuGet/login@8d196754b4036150537f80ac539e15c2f1028841
        id: nugetlogin
        with:
          user: Tavstal

      - name: Publish to NuGet.org
        if: github.ref == 'refs/heads/stable'
        run: |
          dotnet nuget push ./nupkg/*.nupkg \
            --source https://api.nuget.org/v3/index.json \
            --api-key ${{steps.nugetlogin.outputs.NUGET_API_KEY}} \
            --skip-duplicate
          dotnet nuget push ./nupkg/*.snupkg \
            --source https://api.nuget.org/v3/index.json \
            --api-key ${{steps.nugetlogin.outputs.NUGET_API_KEY}} \
            --skip-duplicate